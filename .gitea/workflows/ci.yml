name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Syntax & Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner:
          - ansible-dev-centos
          - ansible-dev-fedora
          - ansible-dev-debian

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up virtual environment and install dependencies
        run: |
          python3 -m venv .ci-venv
          .ci-venv/bin/pip install --upgrade pip
          .ci-venv/bin/pip install markdown pygments pymdown-extensions pytest

      - name: Check syntax (py_compile)
        run: .ci-venv/bin/python -m py_compile ssg.py && echo "Syntax OK"

      - name: Run tests
        run: .ci-venv/bin/python -m pytest tests/ -v --tb=short

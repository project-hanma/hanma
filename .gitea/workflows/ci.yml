name: CI

on:
  push:
    branches: ["develop", "feat/**"]
  pull_request:
    branches: ["develop", "feat/**"]

jobs:
  test:
    name: Syntax & Tests
    runs-on: ansible-dev-fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -r requirements.txt --break-system-packages

      - name: Check syntax (py_compile)
        run: python3 -m py_compile hanma.py && echo "Syntax OK"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: [test]
    steps:
      - name: Cleanup Stale Build Cache
        run: docker system prune -af

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username ${{ secrets.REGISTRY_USER }} --password-stdin ${{ vars.REGISTRY }}

      - name: Build Image
        run: |
          docker build --no-cache -t ${{ vars.REGISTRY }}/${{ github.repository }}/${{ vars.BUILD_NAME }}:${{ github.ref_name }} .

      - name: Push Image
        run: |
          docker push ${{ vars.REGISTRY }}/${{ github.repository }}/${{ vars.BUILD_NAME }}:${{ github.ref_name }}

      - name: Cleanup Local Image
        run: |
          docker rmi ${{ vars.REGISTRY }}/${{ github.repository }}/${{ vars.BUILD_NAME }}:${{ github.ref_name }}

      - name: Cleanup Docker Login
        if: always()
        run: rm -v /home/builds/.docker/config.json

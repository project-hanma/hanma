name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop"]

jobs:
  test:
    name: Syntax & Tests
    runs-on: ansible-dev-fedora
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -r requirements-dev.txt --break-system-packages

      - name: Check syntax (py_compile)
        run: python3 -m py_compile hanma.py && echo "Syntax OK"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted
    if: github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'main')
    defaults:
      run:
        working-directory: /home/builds/src
    steps:
      - name: Cleanup Stale Artifacts
        run: rm -rfv /home/builds/src/* /home/builds/src/.[!.]*

      - name: Environment Check
        run: |
          echo "BUILD_USER: $(whoami)" && echo
          echo "PWD: $(pwd)" && echo
          hostnamectl && echo
          lscpu && echo
          env && echo
          docker info && echo

      - name: Clone Repository
        run: |
          git clone ${{ github.server_url }}/${{ github.repository }}.git
          cd hanma
          git checkout ${{ github.head_ref || github.ref_name }}

      - name: Extract App Version
        run: |
          cd hanma
          APP_VERSION=$(grep '__version__' app/_version.py | cut -d'"' -f2)
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

      - name: Prepare Docker Metadata
        run: |
          # Sanitize repository name
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Use base_ref for PRs (target branch) or ref_name for pushes
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG_SAFE=$(echo "${{ github.base_ref }}" | tr '[:upper:]' '[:lower:]')
          else
            TAG_SAFE=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          fi

          # Map 'main' branch to 'latest' tag
          if [ "$TAG_SAFE" = "main" ]; then
            TAG_SAFE="latest"
          fi

          echo "IMAGE_FULL_PATH=${{ vars.REGISTRY }}/${REPO_LOWER}:${TAG_SAFE}" >> $GITHUB_ENV

          # Set version-specific path for main branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_VERSION_PATH=${{ vars.REGISTRY }}/${REPO_LOWER}:${APP_VERSION}" >> $GITHUB_ENV
          fi

      - name: Docker Login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username ${{ secrets.REGISTRY_USER }} --password-stdin ${{ vars.REGISTRY }}

      - name: Build Image
        run: |
          cd hanma
          docker pull ${IMAGE_FULL_PATH} || true
          docker build --cache-from ${IMAGE_FULL_PATH} -f Containerfile -t ${IMAGE_FULL_PATH} .
          if [ -n "${IMAGE_VERSION_PATH}" ]; then
            docker tag ${IMAGE_FULL_PATH} ${IMAGE_VERSION_PATH}
          fi

      - name: Push Image
        run: |
          docker push ${IMAGE_FULL_PATH}
          if [ -n "${IMAGE_VERSION_PATH}" ]; then
            docker push ${IMAGE_VERSION_PATH}
          fi

      - name: Cleanup Local Image
        if: always()
        run: |
          docker rmi ${IMAGE_FULL_PATH} || true
          if [ -n "${IMAGE_VERSION_PATH}" ]; then
            docker rmi ${IMAGE_VERSION_PATH} || true
          fi
          docker image prune -f

      - name: Cleanup Docker Login
        if: always()
        run: rm -v /home/builds/.docker/config.json

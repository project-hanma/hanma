name: CI

on:
  push:
    branches: ["develop", "feat/**"]
  pull_request:
    branches: ["develop", "feat/**"]

jobs:
  test:
    name: Syntax & Tests
    runs-on: ansible-dev-fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -r requirements.txt --break-system-packages

      - name: Check syntax (py_compile)
        run: python3 -m py_compile hanma.py && echo "Syntax OK"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: [test]
    defaults:
      run:
        working-directory: /home/builds/src
    steps:
      - name: Cleanup Stale Artifacts
        run: rm -rfv *

      - name: Environment Check
        run: |
          echo "BUILD_USER: $(whoami)" && echo
          echo "PWD: $(pwd)" && echo
          hostnamectl && echo
          lscpu && echo
          env && echo
          docker info && echo

      - name: Clone Repository
        run: |
          git clone https://gitea.thezengarden.net/Python/hanma.git
          cd hanma
          git checkout ${{ github.ref_name }}

      - name: Prepare Docker Metadata
        run: |
          # Sanitize repository name and branch for Docker (lowercase, replace / with -)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG_SAFE=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          
          echo "IMAGE_FULL_PATH=${{ vars.REGISTRY }}/${REPO_LOWER}:${TAG_SAFE}" >> $GITHUB_ENV

      - name: Docker Login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username ${{ secrets.REGISTRY_USER }} --password-stdin ${{ vars.REGISTRY }}

      - name: Build Image
        run: |
          cd hanma
          docker build --no-cache -f Containerfile -t ${IMAGE_FULL_PATH} .

      - name: Push Image
        run: |
          docker push ${IMAGE_FULL_PATH}

      - name: Cleanup Local Image
        if: always()
        run: |
          docker rmi ${IMAGE_FULL_PATH} || true
          docker image prune -f

      - name: Cleanup Docker Login
        if: always()
        run: rm -v /home/builds/.docker/config.json

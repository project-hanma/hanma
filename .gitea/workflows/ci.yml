name: CI

on:
  push:
    branches: ["develop", "cr1"]
  pull_request:
    branches: ["develop", "cr1"]

jobs:
  test:
    name: Syntax & Tests
    runs-on: ansible-dev-fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install markdown pygments pymdown-extensions pyyaml pytest --break-system-packages

      - name: Check syntax (py_compile)
        run: python3 -m py_compile ssg.py && echo "Syntax OK"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
